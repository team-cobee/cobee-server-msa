apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-deployment
  labels:
    app: eureka-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: 65553a5d-kr1-registry.container.nhncloud.com/cobee-server/eureka-server:latest
          ports:
            - containerPort: 8761
          envFrom:
            - secretRef:
                name: cobee-secret
          env:
            - name: EUREKA_CLIENT_REGISTERWITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka-service:8761/eureka/
            - name: EUREKA_SERVER_PEER_NODE_READ_TIMEOUT_MS
              value: "20000"
          resources:
            limits:
              memory: "256Mi"
              cpu: "100m"
            requests:
              memory: "256Mi"
              cpu: "100m"
      imagePullSecrets:
        - name: registry-credential
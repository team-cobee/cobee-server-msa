server:
  port: 8081
spring:
  application:
    name: member-service

  config:
    import: "optional:configserver:"   # 추가가 핵심
  cloud:
    config:
      uri: http://localhost:8888       # config server 주소

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}

    username: ${DB_USERNAME:postgres}

    password: ${DB_PASSWORD:'' }
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      url: redis://localhost:6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expire-time: 86400000
  refresh-token-expire-time: 604800000

app:
  backend:
    url: ${BACKEND_URL:http://localhost:8080}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
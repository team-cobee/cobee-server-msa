server:
  port: 8084

spring:
  application:
    name: alarm-service
  config:
    import: "optional:configserver:"   # 추가가 핵심
  cloud:
    config:
      uri: http://localhost:8888       # config server 주소

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}

    username: ${DB_USERNAME:postgres}

    password: ${DB_PASSWORD:'' }
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  backend:
    url: ${BACKEND_URL:http://localhost:8080}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-service:8761/eureka/
  instance:
    prefer-ip-address: true

nhn:
  push:
    base-url: ${NHN_PUSH_BASE_URL}
    app-key: ${NHN_PUSH_APP_KEY}
    secret-key: ${NHN_PUSH_SECRET_KEY}
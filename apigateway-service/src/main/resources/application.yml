server:
  port: 8080

spring:
  application:
    name: apigateway-service
  config:
    import: "optional:configserver:"     # ★ Config Server에서 외부설정 당겨오기
  cloud:
    config:
      uri: http://localhost:8888         # ★ Config Server 주소
    gateway:
      server:
        webflux:
          routes:
            - id: recruit
              uri: lb://RECRUIT-SERVICE
              predicates: Path=/recruit/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
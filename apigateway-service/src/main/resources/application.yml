spring:
  application:
    name: apigateway-service
  config:
    import: "optional:configserver:http://localhost:8888"       # ★ Config Server 주소

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

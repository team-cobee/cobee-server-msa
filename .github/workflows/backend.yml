name: Build and Push Backend Image

on:
  push:
    branches: ["develop"]

env:
  REGISTRY: ${{ secrets.NCR_REGISTRY }}
  REPOSITORY: ${{ secrets.NCR_REPOSITORY }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Log in to NCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NCR_USERNAME }}   # User Access Key ID
          password: ${{ secrets.NCR_PASSWORD }}   # User Secret Key

      - name: Build and push
        run: |
          docker build -t backend_img ./backend
          docker tag backend_img ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/backend_img:latest
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/backend_img:latest

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}